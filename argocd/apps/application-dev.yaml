---
# This child Application describes the dev workload ArgoCD should deploy.
# It lives under the root app path so ArgoCD can discover and manage it from Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-deep-dive-platform
  namespace: argocd
  finalizers:
    # Ensures the deployed Kubernetes resources are cleaned up through ArgoCD.
    - resources-finalizer.argocd.argoproj.io

spec:
  project: default

  sources:
    # The chart stays in the app repository so application release logic remains owned there.
    - repoURL: https://github.com/roeebronfeld/deep-dive-devops-platform-app.git
      targetRevision: main
      path: helm/deep-dive-devops-platform
      helm:
        # ArgoCD resolves this file from the GitOps source declared below.
        # This keeps environment-specific configuration in the GitOps repo instead of embedding it here.
        valueFiles:
          - $values/apps/dev/values.yaml
    # The GitOps repository is mounted as a second source so the chart can consume dev values from it.
    # This is the standard ArgoCD pattern when chart code and environment config live in separate repos.
    - repoURL: https://github.com/roeebronfeld/deep-dive-devops-platform-gitops.git
      targetRevision: main
      ref: values

  destination:
    # This is the cluster and namespace where the workload will be deployed.
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      # Prune removes resources no longer defined by the chart or values in Git.
      prune: true
      # selfHeal lets ArgoCD correct manual drift in the cluster.
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
